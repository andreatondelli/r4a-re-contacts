<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ponte VHF — Mappa Collegamenti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="loader">
  <div class="loader-call">IQ4RE</div>
  <div class="loader-sub">Caricamento collegamenti in corso...</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div id="error-banner"></div>

<div id="app">
  <header>
    <div class="header-left">
      <div class="logo" id="logo-main"></div>
      <div style="display:flex;align-items:center;gap:8px">
        <button id="stats-btn" class="layer-btn" title="Statistiche">Stats</button>
        <div class="live-badge"><div class="live-dot"></div> LIVE</div>
      </div>
    </div>

    <!-- Pannello stats (mobile, sotto header) -->
    <div id="stats-panel">
      <div class="stat-mini"><div class="stat-mini-val" id="h-total-m">—</div><div class="stat-mini-lbl">Contatti</div></div>
      <div class="stat-mini"><div class="stat-mini-val" id="h-maxdist-m">—</div><div class="stat-mini-lbl">Dist. max</div></div>
      <div class="stat-mini"><div class="stat-mini-val" id="h-avgdist-m">—</div><div class="stat-mini-lbl">Dist. media</div></div>
      <div class="stat-mini"><div class="stat-mini-val" id="h-best-m">—</div><div class="stat-mini-lbl">Miglior DX</div></div>
      <button class="stats-close" id="stats-close" title="Chiudi">✕</button>
    </div>

    <div class="layer-switcher">
      <button class="layer-btn" data-layer="dark">DARK</button>
      <button class="layer-btn active" data-layer="light">LIGHT</button>
      <button class="layer-btn" data-layer="satellite">SAT</button>
    </div>

    <!-- Stats inline (desktop) -->
    <div class="header-right">
      <div class="stat-mini"><div class="stat-mini-val" id="h-total">—</div><div class="stat-mini-lbl">Contatti</div></div>
      <div class="stat-mini"><div class="stat-mini-val" id="h-maxdist">—</div><div class="stat-mini-lbl">Dist. max</div></div>
      <div class="stat-mini"><div class="stat-mini-val" id="h-avgdist">—</div><div class="stat-mini-lbl">Dist. media</div></div>
      <div class="stat-mini"><div class="stat-mini-val" id="h-best">—</div><div class="stat-mini-lbl">Miglior DX</div></div>
    </div>
  </header>

  <div id="map-area">
    <div id="map"></div>
    <div id="sidebar"><!-- generato da app.js --></div>
    <button id="filter-btn" title="Filtri e legenda">☰</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
